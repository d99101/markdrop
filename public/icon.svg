<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>

    <linearGradient id="innerGradDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#404040"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
  </defs>

  <!-- Rotated teardrop -->
  <g transform="rotate(8 128 128)" filter="url(#shadow)">

    <path d="M128 20
             C92 70, 52 110, 52 166
             C52 210, 88 236, 128 236
             C168 236, 204 210, 204 166
             C204 110, 164 70, 128 20 Z"
          fill="url(#innerGradDark)"
          stroke="#ffffff"
          stroke-width="3.5"/>

    <path d="M128 36
             C98 82, 68 118, 68 166
             C68 198, 96 220, 128 220
             C160 220, 188 198, 188 166
             C188 118, 158 82, 128 36 Z"
          fill="none"
          stroke="rgba(255,255,255,0.08)"
          stroke-width="2"/>
  </g>

  <!-- Keep text OUTSIDE rotation, or counter-rotate -->
  <g>

    <!-- # -->
    <text x="128" y="115"
          text-anchor="middle"
          font-family="monospace"
          font-size="52"
          font-weight="700"
          fill="#ffffff">
      #
    </text>

    <!-- .MD -->
    <text x="128" y="170"
          text-anchor="middle"
          font-family="monospace"
          font-size="34"
          fill="#e0e0e0"
          letter-spacing="1.5">
      .MD
    </text>

  </g>

</svg>
